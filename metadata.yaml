name: astrbot_plugin_hotsearch
desc: 实时热搜聚合插件，支持抖音/小红书/知乎/微博/百度/懂车帝/哔哩哔哩/腾讯/头条/猫眼票房/夸克/豆瓣/36氪/51CTO/52破解/AcFun/CSDN/HelloGitHub/米游社/爱范儿/IT之家/掘金/网易新闻/新浪新闻/少数派/澎湃新闻/气象预警/微信读书/第一财经/游研社，指令无需参数，默认输出图片。
help: |
  【指令】
  - 抖音热搜
  - 小红书热搜
  - 知乎热搜
  - 微博热搜
  - 百度热搜
  - 懂车帝热搜
  - 哔哩哔哩热搜
  - 腾讯新闻热搜
  - 头条热搜
  - 猫眼票房
  - 夸克热搜
  - 豆瓣热榜 (指令: 豆瓣 电影/国内剧/全球剧/国内综艺/全球综艺)
  - 36氪热搜 (指令: 36氪 人气/视频/热议/收藏)
  - 51CTO热搜
  - 52破解热搜 (指令: 52破解 精华/热门/回复/发表)
  - AcFun热搜 (指令: AcFun 综合/番剧/动画/娱乐/生活/音乐/舞蹈/游戏/科技/影视/体育/鱼塘)
  - CSDN热搜
  - HelloGitHub热搜 (指令: HelloGitHub 精选/全部)
  - 米游社热搜 (指令: 米游社 [原神/崩坏3/崩坏学园2/未定事件簿/大别野/星穹铁道/绝区零] [公告/活动/资讯])
  - 爱范儿热搜
  - IT之家热搜 [热榜]
  - 掘金热搜 [前端/后端/Android/iOS/人工智能/开发工具/代码人生/阅读]
  - 网易新闻热搜
  - 新浪新闻热搜 [热议/视频/娱乐/AI/汽车/育儿/时尚/旅游/ESG]
  - 少数派热搜 (指令: 少数派 应用/生活/效率/播客)
  - 澎湃新闻热搜
  - 气象预警 (指令: 气象预警 [省份]，默认全国)
  - 微信读书热搜 (指令: 微信读书 热搜/新书/小说/总榜)
  - 第一财经热搜
  - 游研社热搜
  - 热搜帮助
version: v1.0.4
author: 柠柚
repo: https://github.com/ningyou8023/astrbot_plugin_hotsearch
